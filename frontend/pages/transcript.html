<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transcript</title>
    <link rel="stylesheet" href="../css/transcript.css" />
  </head>
  <body>
    <header>
      <div id="logo">
        <img src="../public/images/logo-bg-removed.png" alt="logo" />
      </div>
      <div id="account">
        <!-- Will show either "Admin" either the student name -->
        <details>
          <summary><class id="student-name">John Doe</class></summary>
          <a href="#" id="signout-link">Sign out</a>
        </details>
      </div>
    </header>
    <main>
      <aside>
        <nav id="menu">
          <ul class="nav-bar">
            <li>
              <a href="../pages/student-dashboard.html">Dashboard</a>
            </li>
            <li>
              <a href="../pages/courses.html">Courses</a>
            </li>
            <li>
              <a href="../pages/transcript.html">Transcript</a>
            </li>
            <li>
              <a href="../pages/schedule.html">Schedule</a>
            </li>
          </ul>
        </nav>
      </aside>
      <h1>Academic Transcript</h1>
      <div class="contentHub">
        <table
          id="Transcript"
          border="4"
          cellspacing="0"
          cellpadding="10"
          style="text-align: left"
        >
          <thead>
            <tr>
              <th>Courses</th>
              <th>Credits</th>
              <th>Grade</th>
            </tr>
          </thead>
          <tbody>
            <tr id="transcriptRow">
              <td id="transcriptCourse"></td>
              <td id="transcriptCredits"></td>
              <td id="transcriptGrade"></td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
    <script></script>
  </body>
</html>
